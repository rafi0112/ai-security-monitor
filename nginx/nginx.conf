worker_processes auto;
error_log /var/log/nginx/error.log warn;

events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format combined_timing
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log combined_timing;

    sendfile on; gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/s;

    upstream backend  { server backend:8000;  }
    upstream frontend { server frontend:80; }

    server {
        listen 80;
        server_name localhost;

        add_header X-Frame-Options        "DENY"          always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;

        location / {
            proxy_pass       http://frontend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass       http://backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /api/auth/login {
            limit_req zone=login_zone burst=10 nodelay;
            limit_req_status 429;
            proxy_pass       http://backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
